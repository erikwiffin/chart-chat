type Query {
  hello: String!
  users: [User!]!
  projects: [Project!]!
  project(id: ID!): Project
  chart(id: ID!): Chart
  chartRevisions(chartId: ID!): [ChartRevision!]!
}

type Mutation {
  createUser(name: String!, email: String!): User!
  createProject(name: String!): Project!
  createProjectFromPrompt(content: String!): Project!
  sendMessage(projectId: ID!, content: String!, activeChartId: ID): Message!
  stopGeneration(projectId: ID!): Boolean!
  updateChart(chartId: ID!, title: String!, spec: String!): Chart!
  revertChart(chartId: ID!, version: Int!): Chart!
  deleteChart(chartId: ID!): Boolean!
  deleteDataSource(dataSourceId: ID!): Boolean!
}

type Subscription {
  messageAdded(projectId: ID!): Message!
  projectNameUpdated(projectId: ID!): Project!
  chartAdded(projectId: ID!): Chart!
  chartUpdated(projectId: ID!): Chart!
  chartDeleted(projectId: ID!): ChartDeletedEvent!
  statusUpdate(projectId: ID!): StatusUpdate!
}

type StatusUpdate {
  message: String!
  task: String!
  isGenerating: Boolean!
}

type ChartDeletedEvent {
  id: ID!
}

type User {
  id: ID!
  name: String!
  email: String!
}

type Project {
  id: ID!
  uuid: String!
  name: String!
  messages: [Message!]!
  dataSources: [DataSource!]!
  charts: [Chart!]!
  createdAt: String!
}

enum MessageRole {
  user
  assistant
}

type Message {
  id: ID!
  content: String!
  role: MessageRole!
  createdAt: String!
}

type DataSource {
  id: ID!
  name: String!
  sourceType: String!
  columns: [String!]!
  rowCount: Int!
  createdAt: String!
}

type Chart {
  id: ID!
  title: String!
  spec: String!
  version: Int!
  createdAt: String!
  thumbnailUrl: String
}

type ChartRevision {
  id: ID!
  version: Int!
  spec: String!
  createdAt: String!
}
